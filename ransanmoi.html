<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rắn săn mồi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-page: #f0ede6;
      --bg-canvas: #e8eade;
      --grid: rgba(0,0,0,0.07);
      --snake-head: #2c3520;
      --snake-body: #4e6030;
      --snake-inner: #3d5022;
      --snake-eye: #e8eade;
      --food: #8b4513;
      --text-primary: #1a1a18;
      --text-secondary: #5a5a52;
      --text-muted: #888878;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.12);
      --border-strong: rgba(0,0,0,0.22);
      --radius: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page: #141412;
        --bg-canvas: #1a1a18;
        --grid: rgba(255,255,255,0.04);
        --snake-head: #d4d0c0;
        --snake-body: #7a8060;
        --snake-inner: #626a4e;
        --snake-eye: #1a1a18;
        --food: #c8905a;
        --text-primary: #e8e4d8;
        --text-secondary: #9a9688;
        --text-muted: #666658;
        --surface: #222220;
        --border: rgba(255,255,255,0.10);
        --border-strong: rgba(255,255,255,0.18);
      }
    }

    body {
      background: var(--bg-page);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding: 2rem 1rem;
    }

    #title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 400px;
    }

    #score-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    #score {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      min-width: 48px;
    }

    #diff-block { display: flex; gap: 4px; }

    .diff-btn {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 500;
      background: transparent;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      color: var(--text-secondary);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.1s, color 0.1s;
    }

    .diff-btn:hover { background: var(--border); }

    .diff-btn.active {
      background: var(--text-primary);
      color: var(--bg-page);
      border-color: var(--text-primary);
    }

    #canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 0.5px solid var(--border-strong);
    }
    canvas { display: block; }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
    }

    #overlay.show { display: flex; }

    #overlay-box {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    #over-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
    }

    #over-score {
      font-size: 36px;
      font-weight: 500;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
    }

    #over-msg { font-size: 13px; color: var(--text-secondary); }

    #restart-btn {
      margin-top: 0.25rem;
      padding: 8px 28px;
      font-size: 14px;
      font-weight: 500;
      background: var(--text-primary);
      color: var(--bg-page);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    #restart-btn:hover { opacity: 0.82; }

    #hint { font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; }
  </style>
</head>
<body>

  <div id="title">Rắn săn mồi</div>

  <div id="hud">
    <div>
      <div id="score-label">Điểm</div>
      <div id="score">0</div>
    </div>
    <div id="diff-block">
      <button class="diff-btn active" data-speed="300">Dễ</button>
      <button class="diff-btn" data-speed="180">Bình thường</button>
      <button class="diff-btn" data-speed="100">Khó</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="overlay-box">
        <div id="over-label">Kết thúc</div>
        <div id="over-score">0</div>
        <div id="over-msg">Nhấn để chơi lại</div>
        <button id="restart-btn">Chơi lại</button>
      </div>
    </div>
  </div>

  <div id="hint">↑ ↓ ← → để điều khiển · Vuốt trên màn hình cảm ứng</div>

  <script>
    const cvs = document.getElementById('canvas');
    const ctx = cvs.getContext('2d');
    const CELL = 20;
    const COLS = cvs.width / CELL;

    const css = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

    let snake, food, dir, score, interval, moved, speed;
    speed = 300;

    function init() {
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      dir = {x: 1, y: 0};
      score = 0;
      moved = false;
      document.getElementById('score').textContent = '0';
      document.getElementById('overlay').classList.remove('show');
      spawnFood();
      clearInterval(interval);
      interval = setInterval(tick, speed);
      draw();
    }

    function spawnFood() {
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
y: Math.floor(Math.random() * COLS)
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function tick() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      moved = false;

      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= COLS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        clearInterval(interval);
        document.getElementById('over-score').textContent = score;
        document.getElementById('overlay').classList.add('show');
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function draw() {
      const W = cvs.width, H = cvs.height;

      ctx.fillStyle = css('--bg-canvas');
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = css('--grid');
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(W, i * CELL); ctx.stroke();
      }

      // Food
      const fx = food.x * CELL + CELL / 2;
      const fy = food.y * CELL + CELL / 2;
      ctx.fillStyle = css('--food');
      ctx.beginPath();
      ctx.arc(fx, fy, 5.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = css('--food');
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(fx + 1, fy - 4.5);
      ctx.lineTo(fx + 4, fy - 7);
      ctx.stroke();

      // Snake
      snake.forEach((seg, i) => {
        const x = seg.x * CELL;
        const y = seg.y * CELL;
        const pad = i === 0 ? 1.5 : 2.5;
        const r = i === 0 ? 5 : 4;
        const isHead = i === 0;

        ctx.fillStyle = isHead ? css('--snake-head') : css('--snake-body');
        roundRect(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, r);
        ctx.fill();

        if (!isHead) {
          ctx.fillStyle = css('--snake-inner');
          roundRect(x + pad + 2.5, y + pad + 2.5, CELL - pad * 2 - 5, CELL - pad * 2 - 5, 2);
          ctx.fill();
        }

        if (isHead) {
          ctx.fillStyle = css('--snake-eye');
          const s = 2.5;
          if (dir.x === 1)       { ctx.fillRect(x+13, y+5.5, s, s); ctx.fillRect(x+13, y+12, s, s); }
else if (dir.x === -1) { ctx.fillRect(x+4,  y+5.5, s, s); ctx.fillRect(x+4,  y+12, s, s); }
          else if (dir.y === -1) { ctx.fillRect(x+5.5, y+4,  s, s); ctx.fillRect(x+12, y+4,  s, s); }
          else                   { ctx.fillRect(x+5.5, y+13, s, s); ctx.fillRect(x+12, y+13, s, s); }
        }
      });
    }

    document.addEventListener('keydown', e => {
      if (moved) return;
      const map = {
        ArrowLeft:  () => dir.x !== 1  && (dir = {x: -1, y:  0}),
        ArrowRight: () => dir.x !== -1 && (dir = {x:  1, y:  0}),
        ArrowUp:    () => dir.y !== 1  && (dir = {x:  0, y: -1}),
        ArrowDown:  () => dir.y !== -1 && (dir = {x:  0, y:  1}),
      };
      if (map[e.key]) { e.preventDefault(); map[e.key](); moved = true; }
    });

    let tx = null, ty = null;
    cvs.addEventListener('touchstart', e => {
      tx = e.touches[0].clientX;
    ty = e.touches[0].clientY;
    }, {passive: true});
    cvs.addEventListener('touchend', e => {
      if (tx === null) return;
      const dx = e.changedTouches[0].clientX - tx;
      const dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 10 && dir.x !== -1) dir = {x: 1, y: 0};
        else if (dx < -10 && dir.x !== 1) dir = {x: -1, y: 0};
      } else {
        if (dy > 10 && dir.y !== -1) dir = {x: 0, y: 1};
        else if (dy < -10 && dir.y !== 1) dir = {x: 0, y: -1};
      }
      moved = true; tx = null; ty = null;
    }, {passive: true});

    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        speed = parseInt(btn.dataset.speed);
        init();
      });
    });

    document.getElementById('restart-btn').addEventListener('click', init);

    init();
  </script>
</body>
</html>
